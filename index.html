<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Saver Offline</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #111;
    color: white;
}

header {
    background: #1e88e5;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.container {
    padding: 15px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: #00c853;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.card {
    background: #222;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}

a {
    color: #4fc3f7;
    word-break: break-all;
}
</style>
</head>

<body>

<header>📥 Media Saver Offline</header>

<div class="container">

<input id="url" placeholder="Mete YouTube / Facebook / Image link">

<select id="type">
    <option value="video">Video Link</option>
    <option value="image">Image Link</option>
</select>

<button onclick="saveLink()">💾 Save Link</button>

<div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("mediaData") || "[]");

function saveLink() {
    let url = document.getElementById("url").value;
    let type = document.getElementById("type").value;

    if (!url) return;

    data.push({url, type});
    localStorage.setItem("mediaData", JSON.stringify(data));

    document.getElementById("url").value = "";
    render();
}

function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach((item, index) => {

        let div = document.createElement("div");
        div.className = "card";

        let html = `<b>${item.type.toUpperCase()}</b><br>
        <a href="${item.url}" target="_blank">${item.url}</a><br><br>`;

        if (item.type === "image") {
            html += `<img src="${item.url}" style="width:100%;border-radius:10px;">`;
        }

        html += `<br><button onclick="removeItem(${index})">🗑 Delete</button>`;

        div.innerHTML = html;
        list.appendChild(div);
    });
}

function removeItem(i) {
    data.splice(i, 1);
    localStorage.setItem("mediaData", JSON.stringify(data));
    render();
}

render();
</script>

</body>
</html>
